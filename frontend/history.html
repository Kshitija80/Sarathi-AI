<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sarathi AI - Chat History</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .history-container {
            width: 100%;
            max-width: 700px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin: 20px auto;
        }
        .header {
            padding: 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .back-btn {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .list-area {
            flex-grow: 1;
            overflow-y: auto;
            padding: 20px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .history-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .history-card:hover {
            transform: translateY(-2px);
            border-color: rgba(99, 102, 241, 0.3);
        }
        .time-badge {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: block;
        }
        .q-block {
            margin-bottom: 15px;
            border-left: 3px solid var(--accent);
            padding-left: 15px;
        }
        .a-block {
            border-left: 3px solid #10b981;
            padding-left: 15px;
            color: var(--text-secondary);
        }
        .label {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            opacity: 0.7;
        }
        .q-block .label { color: var(--accent); }
        .a-block .label { color: #10b981; }
        
        .loading {
            text-align: center;
            color: var(--text-secondary);
            margin-top: 50px;
        }
    </style>
</head>
<body style="display: block;">

    <div class="history-container">
        <div class="header">
            <a href="dashboard.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Back</a>
            <h2>Chat History</h2>
        </div>
        
        <div class="list-area" id="history-list">
            <div class="loading"><i class="fa-solid fa-spinner fa-spin"></i> Loading your past chats...</div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { auth, db } from './firebase-config.js';
        import { collection, query, where, orderBy, getDocs, limit } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        // Wait for auth to resolve
        auth.onAuthStateChanged(async (user) => {
            if (!user) return; // handled by firebase-config.js redirect

            const listEl = document.getElementById("history-list");
            
            try {
                // Fetch chats for THIS user
                const q = query(
                    collection(db, "chats"), 
                    where("userId", "==", user.uid)
                );
                
                // Note: Firestore requires a composite index to run where() + orderBy() together dynamically.
                // To avoid breaking the user's setup if they don't know how to build indexes, we will fetch and sort in memory!
                const querySnapshot = await getDocs(q);
                
                let chats = [];
                querySnapshot.forEach((doc) => {
                    chats.push(doc.data());
                });

                // Sort descending by timestamp
                chats.sort((a, b) => {
                    const timeA = a.timestamp?.seconds || 0;
                    const timeB = b.timestamp?.seconds || 0;
                    return timeB - timeA;
                });

                listEl.innerHTML = ''; // clear loading

                if (chats.length === 0) {
                    listEl.innerHTML = `<div class="loading">No chat history found. Start talking to Sarathi AI!</div>`;
                    return;
                }

                chats.forEach(chat => {
                    // Format date neatly
                    let dateStr = "Unknown Data";
                    if (chat.timestamp) {
                        const d = new Date(chat.timestamp.seconds * 1000);
                        dateStr = d.toLocaleDateString() + " " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    }

                    const card = document.createElement("div");
                    card.className = "history-card";
                    card.innerHTML = `
                        <span class="time-badge"><i class="fa-regular fa-clock"></i> ${dateStr} ${chat.hasImage ? '📸 (Image Attached)' : ''}</span>
                        <div class="q-block">
                            <div class="label">You Asked</div>
                            <p>${chat.userMessage}</p>
                        </div>
                        <div class="a-block">
                            <div class="label">Sarathi AI Replied</div>
                            <p>${chat.botReply}</p>
                        </div>
                    `;
                    listEl.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                listEl.innerHTML = `<div class="loading" style="color: #ef4444;">Error loading history. Database permission might be restricted.</div>`;
            }
        });
    </script>
</body>
</html>
