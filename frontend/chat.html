<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Modern responsive chatbot interface">
    <title>Modern Chatbot</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="chat-wrapper">
        <header class="chat-header">
            <div class="bot-info">
                <div class="bot-avatar">
                   <i class="fa-solid fa-robot"></i>
                </div>
                <div>
                    <h2>AI Assistant</h2>
                    <p class="status">Online</p>
                </div>
            </div>
            <a href="dashboard.html" class="options-btn" aria-label="Dashboard" style="text-decoration: none;"><i class="fa-solid fa-house"></i></a>
        </header>

        <main class="chat-container" id="chat-container">
            <!-- Initial greeting message -->
            <div class="message bot-message">
                <div class="message-content">
                    <p>Hello! How can I help you today? Feel free to ask me anything.</p>
                </div>
                <div class="message-time" id="initial-time"></div>
            </div>
        </main>

        <div class="typing-indicator" id="typing-indicator" style="display: none;">
            <span></span><span></span><span></span>
        </div>

        <!-- Preview area for selected images -->
        <div id="image-preview-container" style="display: none;">
            <img id="image-preview" src="" alt="Selected Image">
            <button id="remove-image-btn" aria-label="Remove image"><i class="fa-solid fa-xmark"></i></button>
        </div>

        <footer class="chat-input-area">
            <button class="mic-btn attach-btn" id="attach-btn" aria-label="Attach image"><i class="fa-solid fa-image"></i></button>
            <input type="file" id="file-input" accept="image/*" style="display: none;">
            <button class="mic-btn" id="mic-btn" aria-label="Voice input"><i class="fa-solid fa-microphone"></i></button>
            <div class="input-container">
                <input type="text" id="user-input" placeholder="Type your message..." autocomplete="off">
            </div>
            <button class="send-btn" id="send-btn" aria-label="Send message"><i class="fa-solid fa-paper-plane"></i></button>
        </footer>
    </div>
    <script type="module" src="firebase-config.js"></script>
    <script src="script.js"></script>
</body>
</html>
